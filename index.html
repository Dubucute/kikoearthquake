<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#87CEEB"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="JaviAlert"/>
<meta name="description" content="Earthquake safety buddy for your area"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="JaviAlert"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="apple-touch-startup-image" href="icons/icon-512.png" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"/>
<link rel="icon" sizes="192x192" href="icons/icon-192.png"/>
<link rel="icon" sizes="512x512" href="icons/icon-512.png"/>
<title>JaviAlert</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>
<style>
  :root {
    --safe-sky1: #4facfe;
    --safe-sky2: #a8edea;
    --warn-sky1: #f093fb;
    --warn-sky2: #f5576c;
    --danger-sky1: #ff0844;
    --danger-sky2: #ffb199;
    --card-bg: rgba(255,255,255,0.92);
    --text: #2d3436;
    --muted: #636e72;
    --radius: 20px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow-md: 0 4px 16px rgba(0,0,0,.1);
    --shadow-lg: 0 8px 32px rgba(0,0,0,.12);
    --cartoon-border: 3px solid #2d3436;
    --cartoon-shadow: 5px 5px 0px #2d3436;
    --bubble-bg: #fff5f5;
    --accent: #fd79a8;
    --accent2: #00cec9;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    overflow-x: hidden;
  }

  body {
    background: linear-gradient(135deg, var(--safe-sky1) 0%, var(--safe-sky2) 100%);
    background-size: 200% 200%;
    animation: gradientShift 10s ease infinite;
    transition: background 1s ease;
    min-height: 100vh;
    position: relative;
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,.2) 0%, transparent 50%),
                      radial-gradient(circle at 80% 70%, rgba(255,255,255,.15) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  body.warning {
    background: linear-gradient(135deg, var(--warn-sky1) 0%, var(--warn-sky2) 100%);
    background-size: 200% 200%;
    animation: gradientShift 10s ease infinite;
  }
  body.danger {
    background: linear-gradient(135deg, var(--danger-sky1) 0%, var(--danger-sky2) 100%);
    background-size: 200% 200%;
    animation: gradientShift 3s ease infinite;
  }

  .app { max-width: 430px; margin: 0 auto; padding: 16px 16px 32px; position: relative; z-index: 1; }

  /* TOP BAR */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 0 8px;
  }
  .app-name {
    display: flex; align-items: center; gap: 6px;
    font-size: 22px; font-weight: 700; color: white;
    text-shadow: 3px 3px 0px rgba(0,0,0,.15);
    letter-spacing: .5px;
  }
  .app-name i { width: 22px; height: 22px; }
  .refresh-ico {
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,.35);
    border: 2.5px solid rgba(255,255,255,.6); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; color: white; transition: background .2s, transform .15s;
  }
  .refresh-ico:active { background: rgba(255,255,255,.6); transform: scale(.92); }
  .refresh-ico:disabled { opacity: .5; }

  /* LOCATION BAR */
  .loc-bar {
    background: rgba(255,255,255,.8); backdrop-filter: blur(8px);
    border-radius: 30px; padding: 8px 16px;
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: #333; margin-bottom: 12px;
    position: relative; z-index: 50;
    border: 2.5px solid rgba(45,52,54,.2);
  }
  .loc-bar i { width: 14px; height: 14px; color: #e74c3c; flex-shrink: 0; }
  .loc-input {
    flex: 1; border: none; background: transparent;
    font-size: 13px; color: #333; outline: none;
    font-family: inherit; min-width: 0;
  }
  .loc-input::placeholder { color: #999; }
  .loc-dropdown {
    position: absolute; top: 100%; left: 0; right: 0; z-index: 100;
    background: white; border-radius: 14px; margin-top: 4px;
    box-shadow: var(--shadow-lg); max-height: 200px; overflow-y: auto;
    border: 2.5px solid #2d3436;
  }
  .loc-dropdown.hidden { display: none; }
  .loc-dropdown-item {
    padding: 10px 14px; font-size: 13px; color: var(--text);
    cursor: pointer; border-bottom: 2px dashed rgba(0,0,0,.08);
    transition: background .1s;
  }
  .loc-dropdown-item:last-child { border-bottom: none; }
  .loc-dropdown-item:hover, .loc-dropdown-item.active { background: #ffeaa7; }
  .loc-dropdown-item .ld-sub {
    font-size: 11px; color: var(--muted); margin-top: 1px;
  }

  /* CLOUDS */
  .clouds {
    position: relative; height: 70px;
    margin-bottom: -20px;
    pointer-events: none;
  }
  .cloud {
    position: absolute;
    background: rgba(255,255,255,.88);
    border-radius: 50px;
    animation: drift linear infinite;
    will-change: transform;
    filter: drop-shadow(2px 2px 0px rgba(0,0,0,.12));
  }
  .cloud::before, .cloud::after {
    content: ''; position: absolute;
    background: inherit; border-radius: 50%;
  }
  /* Cloud 1 — large, close, fast */
  .c1 {
    width: 90px; height: 26px;
    top: 18px; left: 5%;
    opacity: .9;
    animation-duration: 22s;
  }
  .c1::before { width: 38px; height: 38px; top: -18px; left: 12px; }
  .c1::after  { width: 28px; height: 28px; top: -12px; left: 38px; }
  /* Cloud 2 — small, far, slow */
  .c2 {
    width: 50px; height: 16px;
    top: 32px; left: 40%;
    opacity: .55;
    animation-duration: 35s;
    animation-delay: -10s;
  }
  .c2::before { width: 22px; height: 22px; top: -10px; left: 8px; }
  .c2::after  { width: 16px; height: 16px; top: -6px; left: 22px; }
  /* Cloud 3 — medium, mid */
  .c3 {
    width: 70px; height: 20px;
    top: 14px; right: 8%;
    opacity: .85;
    animation-duration: 26s;
    animation-delay: -6s;
  }
  .c3::before { width: 30px; height: 30px; top: -14px; left: 10px; }
  .c3::after  { width: 22px; height: 22px; top: -10px; left: 30px; }
  /* Cloud 4 — tiny accent */
  .c4 {
    width: 40px; height: 12px;
    top: 40px; left: 18%;
    opacity: .45;
    animation-duration: 40s;
    animation-delay: -18s;
  }
  .c4::before { width: 18px; height: 18px; top: -8px; left: 6px; }
  .c4::after  { width: 12px; height: 12px; top: -5px; left: 18px; }
  /* Cloud 5 — large accent on right */
  .c5 {
    width: 80px; height: 24px;
    top: 24px; right: 25%;
    opacity: .65;
    animation-duration: 30s;
    animation-delay: -14s;
  }
  .c5::before { width: 34px; height: 34px; top: -16px; left: 10px; }
  .c5::after  { width: 24px; height: 24px; top: -10px; left: 34px; }
  @keyframes drift {
    0%   { transform: translateX(0); }
    25%  { transform: translateX(10px) translateY(-2px); }
    50%  { transform: translateX(16px) translateY(0); }
    75%  { transform: translateX(8px) translateY(2px); }
    100% { transform: translateX(0); }
  }

  /* CHARACTER CARD */
  .char-card {
    background: #fff5f5;
    border-radius: 24px; padding: 14px;
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 12px;
    box-shadow: var(--cartoon-shadow);
    border: var(--cartoon-border);
    transform: rotate(-0.3deg);
    position: relative;
  }
  /* Decorative sparkle on character card */
  .char-card::before {
    content: '✦';
    position: absolute;
    top: -8px; right: -8px;
    font-size: 18px;
    color: var(--accent);
    transform: rotate(15deg);
    filter: drop-shadow(1px 1px 0px rgba(0,0,0,.1));
  }

  /* SPEECH BUBBLE */
  .bubble {
    flex: 1; background: white; border-radius: 24px;
    padding: 14px 18px; font-size: 15px; line-height: 1.55;
    color: var(--text); font-weight: 600; position: relative;
    min-height: 56px;
    display: flex; align-items: center; gap: 8px;
    align-self: stretch;
    border: var(--cartoon-border);
  }
  .bubble::after {
    content: ''; position: absolute; right: -12px; top: 50%;
    transform: translateY(-50%);
    border: 8px solid transparent; border-left: 12px solid white;
    filter: drop-shadow(2px 0 0 #2d3436);
  }
  .bubble::before {
    content: ''; position: absolute; right: -15px; top: 50%;
    transform: translateY(-50%);
    border: 8px solid transparent; border-left: 12px solid #2d3436;
    z-index: -1;
  }
  .bubble.loading { color: var(--muted); font-style: italic; }
  .bubble i { width: 18px; height: 18px; flex-shrink: 0; }

  /* KID GIF */
  .kid-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    padding: 18px 0;
  }
  .char-name {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    background: #ffeaa7;
    padding: 3px 16px;
    border-radius: 20px;
    box-shadow: 3px 3px 0px #2d3436;
    white-space: nowrap;
    z-index: 1;
    border: 2.5px solid #2d3436;
    letter-spacing: .5px;
  }
  .kid-gif {
    height: 190px;
    width: 120px;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center center;
    display: block;
    animation: iosBreathe 3s ease-in-out infinite;
  }
  /* Subtle breathing animation for iOS where GIFs don't animate */
  @keyframes iosBreathe {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .kid-wrap.shake .kid-gif {
    animation: shaking .25s infinite;
  }
  
  @keyframes shaking {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    25% { transform: translateX(-3px) rotate(-2deg); }
    75% { transform: translateX(3px) rotate(2deg); }
  }

  /* STATUS PILL */
  .status-pill {
    display: inline-flex; align-items: center; gap: 6px;
    width: fit-content; margin: 0 auto 14px;
    padding: 8px 20px; border-radius: 30px;
    font-size: 15px; font-weight: 700; color: white;
    box-shadow: 4px 4px 0px rgba(0,0,0,.15);
    letter-spacing: .3px;
    border: 2.5px solid #2d3436;
    transform: rotate(-0.5deg);
  }
  .status-pill i { width: 16px; height: 16px; }
  .pill-safe    { background: #00b894; }
  .pill-warning { background: #fdcb6e; color: #2d3436; }
  .pill-danger  { background: #e17055; animation: pulse-red 1s infinite; }
  @keyframes pulse-red { 0%,100% { box-shadow: 4px 4px 0px rgba(0,0,0,.15); } 50% { box-shadow: 4px 4px 0px rgba(0,0,0,.15), 0 0 0 8px rgba(225,112,85,0.3); } }

  /* STATS ROW */
  .stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .stat {
    background: var(--card-bg); border-radius: var(--radius); padding: 14px 10px;
    text-align: center; box-shadow: var(--cartoon-shadow);
    border: var(--cartoon-border);
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 50% 0%, rgba(253,121,168,.08) 0%, transparent 60%);
    pointer-events: none;
  }
  .stat-num { font-size: 32px; font-weight: 800; color: var(--text); position: relative; }
  .stat-lbl  { font-size: 11px; color: var(--muted); margin-top: 3px; font-weight: 600; position: relative; }

  /* QUAKE LIST CARD */
  .list-card {
    background: var(--card-bg); border-radius: var(--radius);
    box-shadow: var(--cartoon-shadow);
    border: var(--cartoon-border); overflow: hidden;
    margin-bottom: 12px;
  }
  .list-header {
    display: flex; align-items: center; gap: 6px;
    padding: 12px 16px; font-size: 13px; font-weight: 700;
    color: var(--muted); letter-spacing: .6px; text-transform: uppercase;
    border-bottom: 2.5px dashed #2d3436;
    background: rgba(255,245,245,.4);
  }
  .list-header i { width: 14px; height: 14px; }
  .list-header { position: relative; }
  #listTitle { flex: 1; }
  .sort-wrap { position: relative; }
  .sort-btn {
    width: 30px; height: 30px; border-radius: 10px;
    border: 2.5px solid #2d3436; background: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: background .15s, transform .15s;
    box-shadow: 2px 2px 0px #2d3436;
  }
  .sort-btn:active { background: #ffeaa7; transform: scale(.92); }
  .sort-btn i { width: 14px; height: 14px; }
  .sort-dropdown {
    position: absolute; top: 100%; right: 0; z-index: 100;
    background: white; border-radius: 14px; margin-top: 6px;
    box-shadow: 4px 4px 0px #2d3436; min-width: 150px;
    border: 2.5px solid #2d3436; overflow: hidden;
  }
  .sort-dropdown.hidden { display: none; }
  .sort-option {
    padding: 10px 14px; font-size: 13px; font-weight: 600;
    color: var(--text); cursor: pointer;
    transition: background .1s; white-space: nowrap;
    border-bottom: 2px dashed rgba(0,0,0,.06);
  }
  .sort-option:last-child { border-bottom: none; }
  .sort-option:hover { background: #ffeaa7; }
  .sort-option.active { background: #dfe6e9; color: #2d3436; }
  .quake-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    border-bottom: 2px dashed rgba(0,0,0,.08);
    transition: background .15s;
  }
  .quake-item:nth-child(even) { background: rgba(255,245,245,.3); }
  .quake-item:last-child { border-bottom: none; }
  .quake-item:active { background: #ffeaa7; }
  .mag-badge {
    width: 46px; height: 46px; border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; color: white; flex-shrink: 0;
    border: 2.5px solid #2d3436;
    box-shadow: 3px 3px 0px #2d3436;
  }
  .mag-low     { background: #00b894; }
  .mag-minor   { background: #fdcb6e; color: #2d3436; }
  .mag-moderate{ background: #e17055; }
  .mag-strong  { background: #d63031; }
  .mag-major   { background: #6c5ce7; }
  .q-info { flex: 1; min-width: 0; }
  .q-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .q-place { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .q-meta  { font-size: 12px; color: var(--muted); margin-top: 2px; font-weight: 500; }
  .q-dist  { font-size: 14px; font-weight: 700; color: var(--muted); flex-shrink: 0; }

  /* PAGINATION */
  .pagination {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px 16px 14px;
    border-top: 2.5px dashed #2d3436;
  }
  .page-btn {
    width: 36px; height: 36px; border-radius: 12px;
    border: 2.5px solid #2d3436;
    background: white; color: var(--text); font-size: 14px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background .15s, transform .15s;
    box-shadow: 2px 2px 0px #2d3436;
  }
  .page-btn:active { background: #ffeaa7; transform: scale(.9); }
  .page-btn:disabled { opacity: .35; cursor: default; box-shadow: none; transform: none; }
  .page-btn.active { background: var(--safe-sky1); color: white; }
  .page-info { font-size: 13px; color: var(--muted); font-weight: 600; min-width: 60px; text-align: center; }

  /* EMPTY */
  .empty { padding: 28px; text-align: center; color: var(--muted); font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 6px; font-weight: 500; }
  .empty i { width: 18px; height: 18px; }

  /* INSTALL BANNER */
  .install-banner {
    background: linear-gradient(135deg, #fd79a8, #e17055);
    border-radius: var(--radius); padding: 14px 16px;
    display: flex; align-items: center; gap: 12px;
    color: white; margin-bottom: 12px; cursor: pointer;
    box-shadow: var(--cartoon-shadow);
    border: var(--cartoon-border);
    transition: opacity .3s, transform .3s;
    animation: bounceIn .5s ease;
  }
  @keyframes bounceIn {
    0% { transform: scale(0.8); opacity: 0; }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }
  .install-banner.hidden { display: none; }
  .install-banner:active { transform: scale(.95); }
  .install-banner i:first-child { width: 24px; height: 24px; }
  .install-banner i:last-child { width: 18px; height: 18px; }
  .install-text { flex: 1; }
  .install-title { display: block; font-size: 15px; }
  .install-desc { font-size: 12px; opacity: .9; }

  /* INSTALL TUTORIAL MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn .25s ease;
  }
  .modal-overlay.hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal-card {
    background: white; border-radius: 24px;
    max-width: 380px; width: 100%;
    box-shadow: 6px 6px 0px #2d3436;
    animation: slideUp .3s ease;
    position: relative;
    overflow: hidden;
    border: 3px solid #2d3436;
  }
  .modal-close {
    position: absolute; top: 12px; right: 12px;
    width: 32px; height: 32px; border-radius: 50%;
    border: 2.5px solid #2d3436; background: white;
    font-size: 20px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); z-index: 2;
    box-shadow: 2px 2px 0px #2d3436;
  }
  .modal-close:active { background: #ffeaa7; }
  .modal-header {
    text-align: center; padding: 28px 24px 12px;
  }
  .modal-header i { width: 48px; height: 48px; color: #fd79a8; margin-bottom: 8px; }
  .modal-title { font-size: 20px; font-weight: 700; color: var(--text); }
  .modal-steps {
    padding: 8px 24px 16px;
  }
  .modal-step {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 0;
    border-bottom: 2px dashed rgba(0,0,0,.08);
  }
  .modal-step:last-child { border-bottom: none; }
  .modal-step-num {
    width: 28px; height: 28px; border-radius: 50%;
    background: #fd79a8; color: white;
    font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
    border: 2px solid #2d3436;
    box-shadow: 2px 2px 0px #2d3436;
  }
  .modal-step-text { font-size: 14px; color: var(--text); line-height: 1.5; font-weight: 500; }
  .modal-step-text strong { display: block; font-size: 13px; color: var(--muted); margin-bottom: 2px; font-weight: 600; }
  .modal-footer { padding: 8px 24px 20px; text-align: center; }
  .modal-btn {
    width: 100%; padding: 12px; border: 2.5px solid #2d3436; border-radius: 14px;
    background: linear-gradient(135deg, #fd79a8, #e17055);
    color: white; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .15s;
    box-shadow: 4px 4px 0px #2d3436;
  }
  .modal-btn:active { opacity: .9; transform: scale(.97); }

  /* FOOTER */
  .footer { text-align: center; font-size: 12px; color: rgba(255,255,255,.8); padding-top: 8px; display: flex; align-items: center; justify-content: center; gap: 4px; font-weight: 500; }
  .footer i { width: 12px; height: 12px; animation: heartBeat 1.5s ease infinite; }
  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  /* LAST UPDATE */
  .last-update { text-align: center; font-size: 11px; color: rgba(0,0,0,.4); padding: 4px 0 8px; font-weight: 500; }

  /* SPIN */
  .spin { animation: spin 1s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Lucide icon sizing */
  .icon-inline { display: inline-flex; align-items: center; vertical-align: middle; }
</style>
</head>
<body>
<main>
<div class="app">

  <div class="topbar">
    <div class="app-name">
      <i data-lucide="globe" aria-hidden="true"></i>
      JaviAlert
    </div>

<script>
(function() {
  'use strict';

  // ─── API & CONFIG ────────────────────────────────────────────
  const API = {
    USGS: 'https://earthquake.usgs.gov/fdsnws/event/1/query',
    NOMINATIM: 'https://nominatim.openstreetmap.org/reverse',
    NOMINATIM_SEARCH: 'https://nominatim.openstreetmap.org/search',
    OPENROUTER: 'https://openrouter.ai/api/v1/chat/completions'
  };
  const OPENROUTER_KEY = ['sk','or','v1','58f7dc74e2b5ffa6940c0241e8a2579f954bf7fe7eaaa7004dad7555e555294a'].join('-');
  const OPENROUTER_MODEL = 'meta-llama/llama-3.2-3b-instruct:free';

  const CONFIG = {
    QUAKE_LIMIT: 25,
    MIN_MAGNITUDE: 1,
    DISPLAY_COUNT: 10,
    AUTO_REFRESH_MS: 300000,
    DANGER_THRESHOLD: 5.0,
    WARNING_THRESHOLD: 3.0,
    RECENT_WINDOW_MS: 172800000,
    TODAY_WINDOW_MS: 86400000
  };

  // ─── FALLBACK MESSAGES (when AI fails) ───────────────────────
  const FALLBACK_MESSAGES = {
    safe: [
      "Safe tayo dito, walang malakas na lindol sa paligid natin.",
      "Okay lang dito sa area natin, walang malakas na pagyanig.",
      "Wala akong nakitang malakas na lindol malapit sa atin.",
      "Relax lang, safe naman tayo ngayon.",
      "Walang malakas na earthquake na malapit sa atin.",
      "Tahimik ang lupa sa paligid natin ngayon.",
      "Safe ang pakiramdam ko dito, walang malakas na lindol.",
      "Wala akong na-detect na malakas na pagyanig sa area natin."
    ],
    warning: [
      "May naramdaman akong katamtamang pagyanig, mag-ingat tayo.",
      "Alert, may moderate na lindol sa malapit, stay aware.",
      "Medyo may galaw ang lupa, ingat lang tayo sa mga susunod.",
      "May nakitang pagyanig na katamtaman, huwag maging kampante.",
      "Ingat, may moderate earthquake na na-detect ako malapit.",
      "May naramdaman akong yanig, stay alert lang tayo.",
      "Katamtamang lindol ang na-detect ko, mag-ingat palagi.",
      "Alert tayo, may moderate na pagyanig na malapit sa atin."
    ],
    danger: [
      "MALAKAS na lindol! Kailangan nating mag-ingat at sumilong!",
      "Emergency! May malakas na pagyanig, manatiling kalmado at safe.",
      "Malakas na lindol ang na-detect ko! Stay safe at mag-ingat.",
      "Danger! May malakas na earthquake, mag-ingat tayo.",
      "Malakas na pagyanig! Sumilong at manatiling safe.",
      "Alert! May malakas na lindol, kailangan nating maging handa.",
      "Malakas na lindol ang na-detect ko! Stay calm at mag-ingat.",
      "Emergency! Malakas na pagyanig, ingat at manatiling safe."
    ]
  };

  // ─── HELPER FUNCTIONS ────────────────────────────────────────
  function timeSince(ts) {
    const diff = Date.now() - new Date(ts).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    if (days < 30) return days + 'd ago';
    return Math.floor(days / 30) + 'mo ago';
  }

  function getCompassDir(lat1, lon1, lat2, lon2) {
    const dLon = ((lon2 - lon1) * Math.PI) / 180;
    const y = Math.sin(dLon) * Math.cos((lat2 * Math.PI) / 180);
    const x = Math.cos((lat1 * Math.PI) / 180) * Math.sin((lat2 * Math.PI) / 180) -
              Math.sin((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.cos(dLon);
    const brng = ((Math.atan2(y, x) * 180) / Math.PI + 360) % 360;
    const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
    return dirs[Math.round(brng / 22.5) % 16];
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = ((lat2 - lat1) * Math.PI) / 180;
    const dLon = ((lon2 - lon1) * Math.PI) / 180;
    const a = Math.sin(dLat / 2) ** 2 +
              Math.cos((lat1 * Math.PI) / 180) * Math.cos((lat2 * Math.PI) / 180) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function parsePlaceName(raw) {
    // USGS format: "20 km SSW of La Paz, Philippines"
    const match = raw.match(/^([\d.]+)\s*km\s+(\w+)\s+of\s+(.+)$/i);
    if (match) {
      return {
        distance: parseFloat(match[1]),
        direction: match[2].toUpperCase(),
        place: match[3].trim()
      };
    }
    return { distance: null, direction: null, place: raw };
  }

  function magClass(mag) {
    if (mag < 3) return 'mag-low';
    if (mag < 4) return 'mag-minor';
    if (mag < 5) return 'mag-moderate';
    if (mag < 6) return 'mag-strong';
    return 'mag-major';
  }

  // ─── JAVIALERT APP ───────────────────────────────────────────
  class JaviAlertApp {
    constructor() {
      this.userLat = null;
      this.userLon = null;
      this.userPlace = '';
      this.currentMood = 'safe';
      this.currentPage = 1;
      this.allQuakes = [];
      this.sortMode = 'nearest';
      this.isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      this.isAndroid = /Android/.test(navigator.userAgent);
      this.deferredPrompt = null;
      this.refreshTimer = null;

      // Bind
      this.init = this.init.bind(this);
      this.loadData = this.loadData.bind(this);
      this.fetchEarthquakeData = this.fetchEarthquakeData.bind(this);
      this.processQuakeData = this.processQuakeData.bind(this);
      this.updateUI = this.updateUI.bind(this);
      this.renderQuakeList = this.renderQuakeList.bind(this);
      this.setMood = this.setMood.bind(this);
      this.getJaviMessage = this.getJaviMessage.bind(this);
      this.detectLocation = this.detectLocation.bind(this);
      this.fetchLocationName = this.fetchLocationName.bind(this);
      this.setupLocationSearch = this.setupLocationSearch.bind(this);
      this.setupSortDropdown = this.setupSortDropdown.bind(this);
      this.applySortAndRender = this.applySortAndRender.bind(this);
      this.setupPagination = this.setupPagination.bind(this);
      this.showInstallTutorial = this.showInstallTutorial.bind(this);
      this.setupInstallPrompt = this.setupInstallPrompt.bind(this);
    }

    // ─── INIT ──────────────────────────────────────────────────
    async init() {
      // Register SW
      if ('serviceWorker' in navigator) {
        try {
          await navigator.serviceWorker.register('sw.js');
        } catch (_) { /* ignore */ }
      }

      // Setup UI
      document.getElementById('refreshBtn').addEventListener('click', () => this.loadData());
      document.getElementById('installBanner').addEventListener('click', () => this.showInstallTutorial());
      document.getElementById('modalClose').addEventListener('click', () => {
        document.getElementById('installModal').classList.add('hidden');
      });
      document.getElementById('modalGotIt').addEventListener('click', () => {
        document.getElementById('installModal').classList.add('hidden');
      });

      this.setupLocationSearch();
      this.setupSortDropdown();
      this.setupPagination();
      this.setupInstallPrompt();

      // Lucide
      try { lucide.createIcons(); } catch (_) { /* ignore */ }

      // Detect location then load
      await this.detectLocation();
      await this.loadData();

      // Auto-refresh
      this.refreshTimer = setInterval(() => this.loadData(), CONFIG.AUTO_REFRESH_MS);
    }

    // ─── LOCATION DETECTION ────────────────────────────────────
    async detectLocation() {
      // Try stored location first
      const stored = localStorage.getItem('javiUserLocation');
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          this.userLat = parsed.lat;
          this.userLon = parsed.lon;
          this.userPlace = parsed.place || '';
          if (this.userPlace) {
            document.getElementById('locInput').value = this.userPlace;
          }
          return;
        } catch (_) { /* ignore */ }
      }

      // Geolocation API with timeout
      try {
        const pos = await new Promise((resolve, reject) => {
          const timeoutId = setTimeout(() => reject(new Error('timeout')), 10000);
          navigator.geolocation.getCurrentPosition(
            (p) => { clearTimeout(timeoutId); resolve(p); },
            (e) => { clearTimeout(timeoutId); reject(e); },
            { enableHighAccuracy: false, timeout: 8000, maximumAge: 300000 }
          );
        });
        this.userLat = pos.coords.latitude;
        this.userLon = pos.coords.longitude;
      } catch (_) {
        // Fallback: Manila
        this.userLat = 14.5995;
        this.userLon = 120.9842;
      }

      // Reverse geocode
      await this.fetchLocationName();
    }

    async fetchLocationName() {
      try {
        const url = API.NOMINATIM + '?format=json&lat=' + this.userLat + '&lon=' + this.userLon + '&addressdetails=1';
        const res = await fetch(url, { headers: { 'User-Agent': 'JaviAlert/1.0' } });
        if (!res.ok) throw new Error('Nominatim failed');
        const data = await res.json();
        const a = data.address || {};
        const parts = [];
        if (a.road) parts.push(a.road);
        if (a.suburb) parts.push(a.suburb);
        if (a.neighbourhood) parts.push(a.neighbourhood);
        if (a.district) parts.push(a.district);
        if (a.municipality) parts.push(a.municipality);
        if (a.state) parts.push(a.state);
        if (a.country) parts.push(a.country);
        this.userPlace = parts.join(', ') || data.display_name || '';
        document.getElementById('locInput').value = this.userPlace;
        localStorage.setItem('javiUserLocation', JSON.stringify({
          lat: this.userLat, lon: this.userLon, place: this.userPlace
        }));
      } catch (_) {
        this.userPlace = this.userLat.toFixed(2) + ', ' + this.userLon.toFixed(2);
        document.getElementById('locInput').value = this.userPlace;
      }
    }

    // ─── LOCATION SEARCH (Nominatim autocomplete) ──────────────
    setupLocationSearch() {
      const input = document.getElementById('locInput');
      const dropdown = document.getElementById('locDropdown');
      let debounceTimer = null;

      input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const q = input.value.trim();
        if (q.length < 3) {
          dropdown.classList.add('hidden');
          return;
        }
        debounceTimer = setTimeout(async () => {
          try {
            const url = API.NOMINATIM_SEARCH + '?format=json&q=' + encodeURIComponent(q) + '&limit=5';
            const res = await fetch(url, { headers: { 'User-Agent': 'JaviAlert/1.0' } });
            if (!res.ok) throw new Error('Search failed');
            const results = await res.json();
            dropdown.innerHTML = '';
            if (!results.length) {
              dropdown.classList.add('hidden');
              return;
            }
            results.forEach((r) => {
              const div = document.createElement('div');
              div.className = 'loc-dropdown-item';
              div.dataset.lat = r.lat;
              div.dataset.lon = r.lon;
              div.dataset.display = r.display_name;
              const name = r.display_name.split(',')[0] || r.display_name;
              div.innerHTML = '<div>' + name + '</div><div class="ld-sub">' + r.display_name + '</div>';
              dropdown.appendChild(div);
            });
            dropdown.classList.remove('hidden');
          } catch (_) {
            dropdown.classList.add('hidden');
          }
        }, 400);
      });

      // Event delegation on dropdown
      dropdown.addEventListener('click', (e) => {
        const item = e.target.closest('.loc-dropdown-item');
        if (!item) return;
        this.userLat = parseFloat(item.dataset.lat);
        this.userLon = parseFloat(item.dataset.lon);
        this.userPlace = item.dataset.display;
        input.value = this.userPlace.split(',')[0] || this.userPlace;
        dropdown.classList.add('hidden');
        localStorage.setItem('javiUserLocation', JSON.stringify({
          lat: this.userLat, lon: this.userLon, place: this.userPlace
        }));
        this.loadData();
      });

      // Close dropdown on outside click
      document.addEventListener('click', (e) => {
        if (!e.target.closest('.loc-bar')) {
          dropdown.classList.add('hidden');
        }
      });

      // Keyboard navigation
      input.addEventListener('keydown', (e) => {
        const items = dropdown.querySelectorAll('.loc-dropdown-item');
        if (!items.length) return;
        const active = dropdown.querySelector('.active');
        let idx = Array.from(items).indexOf(active);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          idx = Math.min(idx + 1, items.length - 1);
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          idx = Math.max(idx - 1, 0);
        } else if (e.key === 'Enter' && active) {
          e.preventDefault();
          active.click();
          return;
        } else {
          return;
        }
        items.forEach((el) => el.classList.remove('active'));
        items[idx].classList.add('active');
      });
    }

    // ─── SORT DROPDOWN ─────────────────────────────────────────
    setupSortDropdown() {
      const btn = document.getElementById('sortBtn');
      const dd = document.getElementById('sortDropdown');
      const options = dd.querySelectorAll('.sort-option');

      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        dd.classList.toggle('hidden');
      });

      options.forEach((opt) => {
        opt.addEventListener('click', () => {
          options.forEach((o) => o.classList.remove('active'));
          opt.classList.add('active');
          this.sortMode = opt.dataset.sort;
          dd.classList.add('hidden');
          this.applySortAndRender();
        });
      });

      document.addEventListener('click', () => {
        dd.classList.add('hidden');
      });
    }

    applySortAndRender() {
      if (!this.allQuakes.length) return;
      let sorted = [...this.allQuakes];
      if (this.sortMode === 'nearest') {
        sorted.sort((a, b) => a.dist - b.dist);
      } else if (this.sortMode === 'newest') {
        sorted.sort((a, b) => new Date(b.time) - new Date(a.time));
      } else if (this.sortMode === 'strongest') {
        sorted.sort((a, b) => b.mag - a.mag);
      }
      this.currentPage = 1;
      this.renderQuakeList(sorted);
    }

    // ─── PAGINATION ────────────────────────────────────────────
    setupPagination() {
      document.getElementById('prevPage').addEventListener('click', () => {
        if (this.currentPage > 1) {
          this.currentPage--;
          this.applySortAndRender();
        }
      });
      document.getElementById('nextPage').addEventListener('click', () => {
        const totalPages = Math.ceil(this.allQuakes.length / CONFIG.DISPLAY_COUNT);
        if (this.currentPage < totalPages) {
          this.currentPage++;
          this.applySortAndRender();
        }
      });
    }

    // ─── FETCH EARTHQUAKE DATA ─────────────────────────────────
    async fetchEarthquakeData() {
      const degRadius = 500 / 111.2;
      const usgsUrl = API.USGS +
        '?format=geojson' +
        '&latitude=' + this.userLat +
        '&longitude=' + this.userLon +
        '&maxradius=' + degRadius +
        '&minmagnitude=' + CONFIG.MIN_MAGNITUDE +
        '&orderby=time' +
        '&limit=' + CONFIG.QUAKE_LIMIT;

      const res = await fetch(usgsUrl);
      if (!res.ok) throw new Error('USGS returned ' + res.status);
      const data = await res.json();
      return data.features || [];
    }

    // ─── PROCESS QUAKE DATA ────────────────────────────────────
    processQuakeData(features) {
      const quakes = features.map((f) => {
        const props = f.properties || {};
        const coords = f.geometry ? f.geometry.coordinates : [0, 0];
        const lat = coords[1];
        const lon = coords[0];
        const dist = getDistance(this.userLat, this.userLon, lat, lon);
        const dir = getCompassDir(this.userLat, this.userLon, lat, lon);
        const parsed = parsePlaceName(props.place || 'Unknown');
        return {
          id: f.id || props.net + props.code,
          mag: props.mag || 0,
          place: parsed.place,
          rawPlace: props.place || 'Unknown',
          time: new Date(props.time),
          lat,
          lon,
          dist: Math.round(dist),
          dir,
          parsedDist: parsed.distance,
          parsedDir: parsed.direction,
          url: props.url || ''
        };
      });

      // Sort by distance (nearest first)
      const quakesByDist = quakes.sort((a, b) => a.dist - b.dist);

      return {
        quakes: quakesByDist,
        todayCount: quakes.filter((q) => (Date.now() - q.time.getTime()) < CONFIG.TODAY_WINDOW_MS).length,
        latestTime: quakes.length ? quakes.reduce((a, b) => a.time > b.time ? a : b).time : null,
        nearestDist: quakes.length ? quakesByDist[0].dist : null
      };
    }

    // ─── UPDATE UI ─────────────────────────────────────────────
    async updateUI(data) {
      const { quakes, todayCount, latestTime, nearestDist } = data;
      this.allQuakes = quakes;

      // Stats
      document.getElementById('statCount').textContent = todayCount;
      document.getElementById('statLatest').textContent = latestTime ? timeSince(latestTime) : '--';
      document.getElementById('statNearest').textContent = nearestDist ? nearestDist + ' km' : '--';

      // Determine mood
      let mood = 'safe';
      const now = Date.now();
      for (const q of quakes) {
        if (q.mag >= CONFIG.DANGER_THRESHOLD && (now - q.time.getTime()) < CONFIG.RECENT_WINDOW_MS) {
          mood = 'danger';
          break;
        }
        if (q.mag >= CONFIG.WARNING_THRESHOLD && (now - q.time.getTime()) < CONFIG.RECENT_WINDOW_MS) {
          mood = 'warning';
        }
      }
      this.setMood(mood);

      // Render quake list with current sort
      this.applySortAndRender();

      // Last update
      document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString();

      // Refresh icon
      const ico = document.getElementById('refreshIcon');
      ico.classList.remove('spin');
    }

    // ─── RENDER QUAKE LIST ─────────────────────────────────────
    renderQuakeList(quakes) {
      const container = document.getElementById('quakeList');
      const totalPages = Math.max(1, Math.ceil(quakes.length / CONFIG.DISPLAY_COUNT));
      const start = (this.currentPage - 1) * CONFIG.DISPLAY_COUNT;
      const pageItems = quakes.slice(start, start + CONFIG.DISPLAY_COUNT);

      if (!pageItems.length) {
        container.innerHTML = '<div class="empty"><i data-lucide="search-off" aria-hidden="true"></i> No earthquakes found</div>';
        try { lucide.createIcons(); } catch (_) { /* ignore */ }
        document.getElementById('pagination').classList.add('hidden');
        return;
      }

      document.getElementById('pagination').classList.remove('hidden');

      let html = '';
      pageItems.forEach((q) => {
        const mag = q.mag.toFixed(1);
        const cls = magClass(q.mag);
        const timeStr = timeSince(q.time);
        const distKm = q.dist + ' km';
        const dirStr = q.dir;

        html += '<div class="quake-item">' +
          '<div class="mag-badge ' + cls + '">' + mag + '</div>' +
          '<div class="q-info">' +
            '<div class="q-top">' +
              '<span class="q-place">' + q.place + '</span>' +
              '<span class="q-dist">' + distKm + '</span>' +
            '</div>' +
            '<div class="q-meta">' + timeStr + ' &middot; ' + dirStr + '</div>' +
          '</div>' +
        '</div>';
      });
      container.innerHTML = html;
      try { lucide.createIcons(); } catch (_) { /* ignore */ }

      // Pagination info
      document.getElementById('pageInfo').textContent = 'Page ' + this.currentPage + ' of ' + totalPages;
      document.getElementById('prevPage').disabled = this.currentPage <= 1;
      document.getElementById('nextPage').disabled = this.currentPage >= totalPages;
    }

    // ─── SET MOOD ──────────────────────────────────────────────
    setMood(mood) {
      this.currentMood = mood;

      // Body class
      document.body.classList.remove('safe', 'warning', 'danger');
      if (mood === 'danger') document.body.classList.add('danger');
      else if (mood === 'warning') document.body.classList.add('warning');
      else document.body.classList.add('safe');

      // Status pill
      const pill = document.getElementById('statusPill');
      pill.className = 'status-pill pill-' + mood;
      const pillText = document.getElementById('pillText');

      // Pill icon
      const existingIcon = pill.querySelector('[data-lucide]') || pill.querySelector('i');
      if (existingIcon) existingIcon.remove();

      const newIcon = document.createElement('i');
      newIcon.setAttribute('data-lucide', mood === 'safe' ? 'shield-check' : mood === 'warning' ? 'alert-triangle' : 'alert-octagon');
      newIcon.setAttribute('aria-hidden', 'true');
      pill.insertBefore(newIcon, pillText);

      try { lucide.createIcons(); } catch (_) { /* ignore */ }

      // GIF
      const gif = document.getElementById('kidGif');
      const ext = this.isIOS ? 'png' : 'gif';
      const shakeWrap = document.getElementById('kidWrap');
      shakeWrap.classList.remove('shake');

      if (mood === 'safe') {
        // Pick random safe GIF 1-3 (but iOS only has 1-2 since safe3.png missing)
        const maxSafe = this.isIOS ? 2 : 3;
        const n = Math.floor(Math.random() * maxSafe) + 1;
        gif.style.backgroundImage = "url('javi/safe" + n + "." + ext + "')";
        pillText.textContent = 'Safe';
      } else if (mood === 'warning') {
        const n = Math.floor(Math.random() * 2) + 1;
        gif.style.backgroundImage = "url('javi/warning" + n + "." + ext + "')";
        pillText.textContent = 'Warning';
      } else {
        const n = Math.floor(Math.random() * 2) + 1;
        gif.style.backgroundImage = "url('javi/danger" + n + "." + ext + "')";
        pillText.textContent = 'DANGER';
        shakeWrap.classList.add('shake');
      }

      // Bubble message
      this.getJaviMessage(mood);
    }

    // ─── GET JAVI MESSAGE (AI or fallback) ─────────────────────
    async getJaviMessage(mood) {
      const bubble = document.getElementById('bubble');
      bubble.className = 'bubble loading';
      bubble.innerHTML = '<i data-lucide="search" aria-hidden="true"></i> Thinking...';
      try { lucide.createIcons(); } catch (_) { /* ignore */ }

      // Try OpenRouter AI
      try {
        const prompts = MOOD_PROMPTS[mood] || MOOD_PROMPTS.safe;
        const prompt = prompts[Math.floor(Math.random() * prompts.length)];

        const res = await fetch(API.OPENROUTER, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + OPENROUTER_KEY,
            'HTTP-Referer': window.location.origin,
            'X-Title': 'JaviAlert'
          },
          body: JSON.stringify({
            model: OPENROUTER_MODEL,
            messages: [
              {
                role: 'system',
                content: 'You are Javi, a friendly earthquake safety buddy for the JaviAlert app. You help users stay informed about earthquakes near them. Always respond in casual Tagalog (Tagalog + English mix) in 1 short sentence. Use first person ("ako", "ko", "akin"). Do not use emojis. Be concise and natural.'
              },
              { role: 'user', content: prompt }
            ],
            max_tokens: 60,
            temperature: 0.8
          })
        });

        if (!res.ok) throw new Error('AI returned ' + res.status);

        const data = await res.json();
        const text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';

        if (text && text.length < 200) {
          bubble.className = 'bubble';
          bubble.innerHTML = text;
          try { lucide.createIcons(); } catch (_) { /* ignore */ }
          return;
        }
      } catch (_) { /* fall through to fallback */ }

      // Fallback
      const msgs = FALLBACK_MESSAGES[mood] || FALLBACK_MESSAGES.safe;
      const msg = msgs[Math.floor(Math.random() * msgs.length)];
      bubble.className = 'bubble';
      bubble.innerHTML = msg;
      try { lucide.createIcons(); } catch (_) { /* ignore */ }
    }

    // ─── LOAD DATA ─────────────────────────────────────────────
    async loadData() {
      const bubble = document.getElementById('bubble');
      const ico = document.getElementById('refreshIcon');

      bubble.className = 'bubble loading';
      bubble.innerHTML = '<i data-lucide="search" aria-hidden="true"></i> Checking for earthquakes...';
      try { lucide.createIcons(); } catch (_) { /* ignore */ }

      ico.classList.add('spin');

      try {
        const features = await this.fetchEarthquakeData();
        const data = this.processQuakeData(features);
        await this.updateUI(data);
      } catch (err) {
        bubble.className = 'bubble';
        bubble.innerHTML = '<i data-lucide="alert-circle" aria-hidden="true"></i> Could not load data. Check your connection.';
        try { lucide.createIcons(); } catch (_) { /* ignore */ }
        ico.classList.remove('spin');
        console.error('loadData error:', err);
      }
    }

    // ─── INSTALL PROMPT ────────────────────────────────────────
    setupInstallPrompt() {
      // Listen for beforeinstallprompt (Android/Desktop)
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        this.deferredPrompt = e;
        const banner = document.getElementById('installBanner');
        banner.classList.remove('hidden');
      });

      // On iOS, show banner with instructions
      if (this.isIOS) {
        const banner = document.getElementById('installBanner');
        banner.classList.remove('hidden');
        banner.querySelector('.install-title').textContent = 'Install on iOS';
        banner.querySelector('.install-desc').textContent = 'Tap Share > Add to Home Screen';
      }
    }

    showInstallTutorial() {
      const modal = document.getElementById('installModal');
      const steps = document.getElementById('modalSteps');
      const icon = document.getElementById('modalDeviceIcon');
      const title = document.getElementById('modalTitle');

      modal.classList.remove('hidden');

      if (this.isIOS) {
        icon.setAttribute('data-lucide', 'smartphone');
        title.textContent = 'Install on iOS';
        steps.innerHTML =
          '<div class="modal-step"><div class="modal-step-num">1</div><div class="modal-step-text"><strong>Open in Safari</strong>Use Safari browser for best results</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">2</div><div class="modal-step-text"><strong>Tap Share</strong>Tap the Share button at the bottom of Safari</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">3</div><div class="modal-step-text"><strong>Scroll down</strong>Find and tap "Add to Home Screen"</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">4</div><div class="modal-step-text"><strong>Tap Add</strong>Tap "Add" in the top right corner</div></div>';
      } else if (this.isAndroid) {
        icon.setAttribute('data-lucide', 'smartphone');
        title.textContent = 'Install on Android';
        steps.innerHTML =
          '<div class="modal-step"><div class="modal-step-num">1</div><div class="modal-step-text"><strong>Open in Chrome</strong>Use Chrome browser</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">2</div><div class="modal-step-text"><strong>Tap the menu</strong>Tap the three-dot menu in the top right</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">3</div><div class="modal-step-text"><strong>Tap Install</strong>Tap "Install App" or "Add to Home Screen"</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">4</div><div class="modal-step-text"><strong>Tap Install</strong>Confirm by tapping "Install" in the dialog</div></div>';
      } else {
        icon.setAttribute('data-lucide', 'monitor');
        title.textContent = 'Install on Desktop';
        steps.innerHTML =
          '<div class="modal-step"><div class="modal-step-num">1</div><div class="modal-step-text"><strong>Open in Chrome/Edge</strong>Use Chrome or Edge browser</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">2</div><div class="modal-step-text"><strong>Look for install icon</strong>Click the install icon in the address bar or menu</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">3</div><div class="modal-step-text"><strong>Click Install</strong>Click "Install" in the popup</div></div>' +
          '<div class="modal-step"><div class="modal-step-num">4</div><div class="modal-step-text"><strong>Launch</strong>Open JaviAlert from your desktop or start menu</div></div>';
      }

      try { lucide.createIcons(); } catch (_) { /* ignore */ }
    }
  }

  // ─── START ───────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    const app = new JaviAlertApp();
    app.init();
  });

})();
</script>
</body>
</html>
